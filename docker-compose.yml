version: '3.8'

services:

  app:
    build: .
    container_name: universite_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - universite_network

  nginx:
    image: nginx:alpine
    container_name: universite_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - universite_network

  db:
    image: mysql:8.0
    container_name: universite_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: universite
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - universite_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: universite_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: laravel
      PMA_PASSWORD: secret
    networks:
      - universite_network

networks:
  universite_network:
    driver: bridge

volumes:
  dbdata: